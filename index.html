<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Viginyx | Precision Pharmacovigilance</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@0.441.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
:root {
  --vg-primary: #002B5B;
  --vg-secondary: #005FB8;
  --vg-tertiary: #00A3AD;
  --vg-teal-light: #E0F5F6;
  --vg-blue-light: #E6F2FB;
  --vg-neutral: #F8FAFC;
  --vg-danger: #E11D48;
}
html, body { background: var(--vg-neutral); margin: 0; padding: 0; min-height: 100vh; overscroll-behavior: none; }

/* ── Animations ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(225,29,72,0.5)} 70%{box-shadow:0 0 0 10px rgba(225,29,72,0)} 100%{box-shadow:0 0 0 0 rgba(225,29,72,0)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

.fade-up { animation: fadeUp 0.35s cubic-bezier(.16,1,.3,1) forwards; }
.slide-in { animation: slideIn 0.3s cubic-bezier(.16,1,.3,1) forwards; }
.danger-ring { animation: pulse-ring 1.4s infinite; }
.spinner { animation: spin 0.8s linear infinite; }
.bounce-dot { animation: bounce 1.2s ease-in-out infinite; }

/* ── Mobile shell ── */
.app-shell {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--vg-neutral);
  position: relative;
  overflow-x: hidden;
}

/* ── Top header ── */
.top-bar {
  background: rgba(248,250,252,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(0,43,91,0.08);
  padding: 12px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0,43,91,0.08);
  display: flex;
  z-index: 100;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
}
.nav-item { flex: 1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; cursor:pointer; transition:all 0.15s; }
.nav-item.active svg, .nav-item.active i { color: var(--vg-secondary); }
.nav-item.active span { color: var(--vg-secondary); font-weight: 700; }
.nav-item span { font-size: 10px; color: #94a3b8; font-weight: 600; letter-spacing: 0.02em; }
.nav-item svg, .nav-item i { width: 22px; height: 22px; color: #94a3b8; transition: color 0.15s; }

/* ── Cards ── */
.card { background: white; border-radius: 20px; border: 1px solid rgba(0,43,91,0.07); overflow: hidden; }
.card-sm { background: white; border-radius: 14px; border: 1px solid rgba(0,43,91,0.07); }

/* ── Buttons ── */
.btn-primary { background: var(--vg-secondary); color: white; border: none; border-radius: 14px; padding: 14px 20px; font-weight: 800; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary:active { transform: scale(0.97); background: var(--vg-primary); }
.btn-outline { background: transparent; color: var(--vg-secondary); border: 1.5px solid var(--vg-secondary); border-radius: 14px; padding: 13px 20px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-outline:active { background: var(--vg-blue-light); }
.btn-teal { background: var(--vg-tertiary); color: white; border: none; border-radius: 14px; padding: 14px 20px; font-weight: 800; font-size: 13px; cursor: pointer; transition: all 0.15s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-ghost { background: var(--vg-blue-light); color: var(--vg-secondary); border: none; border-radius: 12px; padding: 10px 16px; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.btn-danger { background: #FEF2F2; color: #E11D48; border: 1px solid #FECDD3; border-radius: 12px; padding: 10px 16px; font-weight: 700; font-size: 12px; cursor: pointer; }

/* ── Inputs ── */
.input-field { background: #F1F5F9; border: 1.5px solid transparent; border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 600; color: var(--vg-primary); outline: none; width: 100%; transition: all 0.15s; box-sizing: border-box; }
.input-field:focus { background: white; border-color: var(--vg-secondary); box-shadow: 0 0 0 3px rgba(0,95,184,0.1); }
.input-field::placeholder { color: #94a3b8; font-weight: 500; }
.input-label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: block; }

/* ── Status badges ── */
.badge-safe { background: #ECFDF5; color: #059669; border: 1px solid #A7F3D0; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
.badge-danger { background: #FFF1F2; color: #E11D48; border: 1px solid #FECDD3; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
.badge-pending { background: #FFFBEB; color: #D97706; border: 1px solid #FDE68A; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
.badge-info { background: var(--vg-blue-light); color: var(--vg-secondary); border: 1px solid #B3D4EF; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }

/* ── Hero gradient ── */
.hero-gradient { background: linear-gradient(145deg, var(--vg-primary) 0%, var(--vg-secondary) 60%, var(--vg-tertiary) 100%); }
.teal-gradient { background: linear-gradient(135deg, var(--vg-secondary) 0%, var(--vg-tertiary) 100%); }

/* ── Scrollable content area ── */
.page-content { padding: 0 0 100px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── Metric tile ── */
.metric-tile { background: white; border-radius: 16px; border: 1px solid rgba(0,43,91,0.07); padding: 16px; }
.metric-value { font-size: 28px; font-weight: 900; color: var(--vg-primary); line-height: 1; }
.metric-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

/* ── Chat bubbles ── */
.bubble-doctor { background: #EEF6FF; border-radius: 18px 18px 18px 4px; padding: 10px 14px; }
.bubble-patient { background: #E0F5F6; border-radius: 18px 18px 4px 18px; padding: 10px 14px; }
.bubble-pharmacist { background: #FFF7ED; border-radius: 18px 18px 18px 4px; padding: 10px 14px; }
.bubble-system { background: #F1F5F9; border-radius: 10px; padding: 8px 12px; text-align: center; }

/* ── Naranjo grid ── */
.naranjo-btn { padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.12s; border: 1.5px solid transparent; }
.naranjo-btn.yes { background: #EEF6FF; color: var(--vg-secondary); border-color: #B3D4EF; }
.naranjo-btn.yes.active { background: var(--vg-secondary); color: white; }
.naranjo-btn.no { background: #FFF1F2; color: #E11D48; border-color: #FECDD3; }
.naranjo-btn.no.active { background: #E11D48; color: white; }
.naranjo-btn.dk { background: #F8FAFC; color: #64748b; border-color: #E2E8F0; }
.naranjo-btn.dk.active { background: #64748b; color: white; }

/* ── Adherence dots ── */
.adh-dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.15s; }
.adh-dot.taken { background: #059669; border-color: #059669; color: white; }
.adh-dot.missed { background: #E11D48; border-color: #E11D48; color: white; }
.adh-dot.pending { background: white; color: #CBD5E1; }

/* ── Progress bar ── */
.prog-bar { height: 4px; background: #E2E8F0; border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--vg-secondary), var(--vg-tertiary)); border-radius: 99px; transition: width 0.4s ease; }

/* ── Floating action button ── */
.fab { position: fixed; bottom: 84px; right: calc(50% - 200px); width: 56px; height: 56px; background: var(--vg-secondary); border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 90; box-shadow: 0 8px 24px rgba(0,95,184,0.35); transition: all 0.15s; }
.fab:active { transform: scale(0.93); }
.fab svg { width: 24px; height: 24px; color: white; }

/* ── Modal overlay ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,15,40,0.55); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal-sheet { background: white; border-radius: 28px 28px 0 0; width: 100%; max-width: 430px; padding: 28px 24px 40px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(.16,1,.3,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: #E2E8F0; border-radius: 99px; margin: 0 auto 20px; }

/* ── Section header ── */
.section-hd { font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding: 0 20px; }

/* ── Otp input ── */
.otp-box { width: 48px; height: 56px; border: 2px solid #E2E8F0; border-radius: 14px; text-align: center; font-size: 24px; font-weight: 800; color: var(--vg-primary); outline: none; background: #F8FAFC; transition: all 0.15s; }
.otp-box:focus { border-color: var(--vg-secondary); background: white; box-shadow: 0 0 0 3px rgba(0,95,184,0.1); }

/* ── Yellow form ── */
.yf-section { border: 1px solid #CBD5E1; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
.yf-hd { background: var(--vg-primary); color: white; padding: 8px 14px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
.yf-body { padding: 12px; }
.yf-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.yf-field { flex: 1; min-width: 80px; }
.yf-label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 3px; }
.yf-val { font-size: 12px; font-weight: 700; color: #1e293b; border-bottom: 1px solid #CBD5E1; padding-bottom: 3px; }

@media print {
  .top-bar, .bottom-nav, .fab, .no-print { display: none !important; }
  .page-content { padding-bottom: 0 !important; }
  #printable { display: block !important; }
}
</style>
</head>

function fmt(iso) { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
function fmtDMY(iso) { const d=iso?new Date(iso):new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function genCode() { return String(Math.floor(100000+Math.random()*900000)); }
function icon(name,sz='w-5 h-5') { return `<i data-lucide="${name}" class="${sz}"></i>`; }

  warfarin:['Unusual bruising on your body?','Blood in urine or stools?','Bleeding from gums or nose hard to stop?','Severe headache or vision changes?','Cuts that bled longer than usual?','Joint pain or swelling?'],
  default:['New or unusual symptoms?','Skin rash, hives or itching?','Nausea, vomiting or stomach discomfort?','Unusually tired or weak?','Dizziness or light-headedness?','Swelling in face, hands or feet?']
};
function suggestQs(drug) {
  const k=drug.toLowerCase().trim();
  if(DRUG_QS[k]) return [...DRUG_QS[k]];
  for(const [key,qs] of Object.entries(DRUG_QS)) if(key!=='default'&&(k.includes(key)||key.includes(k))) return [...qs];
  return [...DRUG_QS.default];
}

// ── BLOCKCHAIN HELPER ─────────────────────────────────────────────────────────
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function createBlock(data, prevHash='0'.repeat(64)) {
  const content = JSON.stringify({...data, prevHash, ts: new Date().toISOString()});
  const hash = await sha256(content);
  return { hash, prevHash, data, ts: new Date().toISOString(), blockHeight: Date.now() };
}

// ── APP ────────────────────────────────────────────────────────────────────────
class App {
  constructor() {
    this.db = null; this.role = null; this.view = 'splash';
    this.user = null; this.currentPatient = null; this.currentPatientCode = null;
    this.patients = []; this.unsub = null; this.unsubChat = null;
    this.chatMessages = []; this._currentQs = null; this._fbReady = false;
    this.render(); this.initFB();
    setTimeout(()=>{ if(this.view==='splash') { this.view='login'; this.render(); }}, 2800);
  }

  async initFB() {
    try {
      const app = initializeApp(FB);
      this.db = getFirestore(app);
      const auth = getAuth(app);
      // Retry anonymous sign-in up to 3 times
      for (let i = 0; i < 3; i++) {
        try {
          await signInAnonymously(auth);
          this._fbReady = true;
          this.setSyncStatus('live');
          // Dismiss splash and re-render when Firebase is ready
          if (this.view === 'splash') { this.view = 'login'; }
          if (['login','doctor-login','patient-login','doctor-register','patient-register'].includes(this.view)) this.render();
          return;
        } catch(e) {
          if (i === 2) throw e;
          await new Promise(r => setTimeout(r, 800));
        }
      }
    } catch(e) {
      this._fbReady = false;
      this.setSyncStatus('offline');
      console.error('Firebase init error:', e.code, e.message);
    }
  }

  setSyncStatus(s) {
    const el = document.getElementById('sync-indicator');
    if(!el) return;
    const map = {live:['#10B981','Synced'],saving:['#F59E0B','Saving…'],offline:['#EF4444','Offline']};
    const [c,l] = map[s]||map.offline;
    el.innerHTML = `<div style="width:6px;height:6px;border-radius:50%;background:${c};flex-shrink:0"></div><span style="font-size:10px;font-weight:700;color:#64748b">${l}</span>`;
  }

  async saveDoc(path,id,data) {
    this.setSyncStatus('saving');
    try { await setDoc(doc(this.db,path,id),data,{merge:true}); this.setSyncStatus('live'); return true; }
    catch(e) { this.setSyncStatus('offline'); return false; }
  }

  logout() {
    if(this.unsub) this.unsub();
    if(this.unsubChat) this.unsubChat();
    this.role=null; this.view='login'; this.user=null;
    this.currentPatient=null; this.currentPatientCode=null;
    this.patients=[]; this.chatMessages=[];
    this.render();
  }

  go(v, extra={}) {
    if(extra) Object.assign(this, extra);
    this.view=v; this.render();
    document.getElementById('root')?.scrollTo(0,0);
    window.scrollTo(0,0);
  }

  render() {
    const root = document.getElementById('root');
    const topBar = document.getElementById('topBarSlot');
    const navSlot = document.getElementById('navSlot');
    const fabSlot = document.getElementById('fabSlot');
    if(!root) return;

    const views = {
      splash: ()=>this.vSplash(),
      login: ()=>this.vLogin(),
      'doctor-login': ()=>this.vDoctorLogin(),
      'doctor-register': ()=>this.vDoctorRegister(),
      'patient-login': ()=>this.vPatientLogin(),
      'patient-register': ()=>this.vPatientRegister(),
      'doctor-dashboard': ()=>this.vDoctorDashboard(),
      'add-patient': ()=>this.vAddPatient(),
      'common-room': ()=>this.vCommonRoom(),
      'adr': ()=>this.vAdr(),
      'yellow': ()=>this.vYellow(),

    const spec=document.getElementById('dr-spec').value.trim();

      if(!rs.exists()){err.textContent='Invalid room code. Check with your doctor.';err.style.display='block';return;}
      const fullPhone='+91'+phone;
      const profile={name,phone:fullPhone,roomCode:code,registeredAt:new Date().toISOString()};
      await this.saveDoc('patients',fullPhone,profile);
      await this.saveDoc('rooms',code,{patientPhone:fullPhone});
      this.user=profile; this.role='patient';
      this.currentPatientCode=code; this.currentPatient=rs.data();
      this.subscribeRoom(code); this.subscribeChat(code);
      this.view='patient-home'; this.render();
    } catch(e){err.textContent='Error: '+e.message;err.style.display='block';}
  }

  async loginPharmacist() {
    const code=prompt('Enter pharmacist access code:');
    if(!code) return;
    if(code===PHARMACIST_CODE){
      this.role='pharmacist'; await this.loadAllPatients();
      this.view='pharmacist'; this.render(); return;
    }
    try {
      const snap=await getDocs(collection(this.db,'doctors'));
      let matched=null;
      snap.forEach(d=>{ const data=d.data(); if(data.pharmacistCode&&data.pharmacistCode===code) matched=data; });
      if(matched){ this.role='pharmacist'; this._linkedDoctor=matched; await this.loadAllPatients(); this.view='pharmacist'; this.render(); }
      else alert('Incorrect code.');
    } catch(e){ alert('Incorrect code.'); }
  }

    const pos=Object.entries(p.symptoms||{}).filter(([,s])=>s.value===true);
    const taken=(p.adherence||[]).filter(d=>d.s==='taken').length;
    return `
    <div class="card" style="padding:16px;${highlight?'border:1.5px solid #FECDD3':''}cursor:pointer" onclick="app.openPatient('${p.code}')">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:14px;${anyPos?'background:linear-gradient(135deg,#E11D48,#9F1239)':'background:linear-gradient(135deg,var(--vg-secondary),var(--vg-tertiary))'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span style="font-size:14px;font-weight:900;color:white">${p.patientName?.substring(0,2).toUpperCase()||'PT'}</span>
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-size:15px;font-weight:800;color:var(--vg-primary)">${p.patientName}</div>
            ${anyPos?`<span class="badge-danger">⚠ Alert</span>`:`<span class="badge-safe">Stable</span>`}
          </div>
          <div style="font-size:11px;color:#64748b;font-weight:600;margin-top:2px">${p.diagnosis?.substring(0,32)}${p.diagnosis?.length>32?'…':''}</div>
          <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-top:2px">Room ${p.code} · ${p.suspectedDrug} · ${taken}/7 doses</div>
        </div>
        ${icon('chevron-right','w-5 h-5 text-slate-300')}
      </div>
      ${pos.length>0?`<div style="margin-top:10px;background:#FFF1F2;border-radius:10px;padding:8px 12px"><div style="font-size:11px;font-weight:700;color:#E11D48">${icon('alert-circle','w-3 h-3 inline')} ${pos.slice(0,2).map(([k,s])=>{const q=s.question||k;return q.length>30?q.substring(0,28)+'…':q;}).join(' · ')}</div></div>`:''}
    </div>`;
  }

  async openPatient(code) {
    const snap=await getDoc(doc(this.db,'rooms',code));
    if(!snap.exists()) return;
    this.currentPatient=snap.data(); this.currentPatientCode=code;
    this.subscribeRoom(code); this.subscribeChat(code);
    this.go('common-room');
  }

            ${this.role==='doctor'?`<button onclick="app.go('adr')" style="background:rgba(255,255,255,0.15);border:none;border-radius:10px;padding:7px 12px;font-size:11px;font-weight:800;color:white;cursor:pointer">${icon('file-text','w-3.5 h-3.5 inline')} ADR</button>`:''}

        </div>

        <!-- Symptom pills -->
        <div style="display:flex;flex-wrap:wrap;gap:6px">

          }).join('')}

      <!-- Chat feed -->
      <div id="chat-feed" style="padding:14px;display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 380px);overflow-y:auto">

          ${icon('message-circle','w-10 h-10')}

          <div style="font-size:12px;margin-top:4px">Team updates appear here</div>
        </div>`:''}
        ${this.chatMessages.map(m=>this.renderChatMsg(m)).join('')}

      <!-- Doctor extra panels -->

      ${this.role==='patient'?`
      <div style="padding:0 14px">
        <div class="card" style="padding:16px;margin-bottom:10px">
          <div style="font-size:13px;font-weight:800;color:var(--vg-primary);margin-bottom:12px">This week's adherence</div>
          <div style="display:flex;justify-content:space-between">
            ${(p.adherence||[]).map((d,i)=>`
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
              <span style="font-size:10px;font-weight:700;color:#94a3b8">${d.day}</span>

      <div class="bubble-system" style="font-size:11px;color:#64748b;font-weight:600;max-width:80%;padding:8px 14px">${m.content}</div>
    </div>`;

    const isRight=(this.role===m.role);
    return `
    <div style="display:flex;${isRight?'justify-content:flex-end':'justify-content:flex-start'};gap:8px">
      ${!isRight?`<div style="width:28px;height:28px;border-radius:50%;background:${colorMap[m.role]||'#E2E8F0'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:16px">

        <span style="font-size:9px;font-weight:900;color:white">${(m.senderName||'').substring(0,2).toUpperCase()}</span>
      </div>`:''}

  addDrugRow() {
    const c=document.getElementById('drug-rows'); if(!c) return;
    const div=document.createElement('div');
    div.className='drug-row';
    div.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr;gap:6px';
    div.innerHTML=`
      <input type="text" placeholder="Drug name" class="input-field drug-name" style="padding:10px 12px;font-size:13px">
      <input type="text" placeholder="Dose" class="input-field drug-dose" style="padding:10px 12px;font-size:13px">
      <input type="text" placeholder="Freq." class="input-field drug-freq" style="padding:10px 12px;font-size:13px">`;
    c.appendChild(div);
  }

  generateQuestions() {
    const suspected=document.getElementById('pn-suspected').value.trim();
    if(!suspected){alert('Enter the suspected drug name first.');return;}
    this._currentQs=suggestQs(suspected);
    const sec=document.getElementById('questionnaire-section');
    if(sec) sec.style.display='block';
    this._renderQList();
  }

  _renderQList() {
    const list=document.getElementById('question-list'); if(!list||!this._currentQs) return;
    list.innerHTML=this._currentQs.map((q,i)=>`
    <div style="display:flex;gap:8px;align-items:flex-start;background:#F8FAFC;border-radius:10px;padding:10px">
      <span style="font-size:9px;font-weight:800;background:var(--vg-blue-light);color:var(--vg-secondary);padding:3px 8px;border-radius:6px;flex-shrink:0;margin-top:2px">Q${i+1}</span>
      <input type="text" value="${q.replace(/"/g,'&quot;')}" class="input-field" style="flex:1;padding:6px 10px;font-size:12px;background:white" onchange="app._currentQs[${i}]=this.value">
      <button onclick="app._removeQ(${i})" style="background:none;border:none;cursor:pointer;color:#CBD5E1;padding:4px;flex-shrink:0">${icon('x','w-4 h-4')}</button>
    </div>`).join('');
    if(typeof lucide!=='undefined') lucide.createIcons();
  }

  _removeQ(i) { if(this._currentQs) { this._currentQs.splice(i,1); this._renderQList(); } }
  addCustomQ() { if(!this._currentQs) this._currentQs=[]; this._currentQs.push(''); this._renderQList(); setTimeout(()=>{const inputs=document.querySelectorAll('#question-list input');if(inputs.length>0)inputs[inputs.length-1].focus();},50); }

  async createPatient() {
    const name=document.getElementById('pn-name').value.trim();
    const age=document.getElementById('pn-age').value.trim();
    const gender=document.getElementById('pn-gender').value;
    const weight=document.getElementById('pn-weight').value.trim()||'Not recorded';
    const ec=document.getElementById('pn-ec').value.trim()||'Not provided';
    const diagnosis=document.getElementById('pn-diagnosis').value.trim();
    const note=document.getElementById('pn-note').value.trim()||'Monitor for adverse drug reactions.';
    const suspected=document.getElementById('pn-suspected').value.trim();
    const err=document.getElementById('pn-err'); err.style.display='none';
    if(!name||!age||!gender||!diagnosis||!suspected){err.textContent='Fill all required fields.';err.style.display='block';return;}
    const drugs=[]; document.querySelectorAll('.drug-row').forEach(row=>{
      const n=row.querySelector('.drug-name').value.trim();
      const d=row.querySelector('.drug-dose').value.trim();
      const f=row.querySelector('.drug-freq').value.trim();
      if(n) drugs.push({id:'m'+Date.now()+Math.random().toString(36).slice(2),name:n,dose:d||'As prescribed',freq:f||'As directed',delivered:false,stocked:true});
    });
    if(drugs.length===0){err.textContent='Add at least one medication.';err.style.display='block';return;}
    let code=genCode();
    for(let i=0;i<10;i++){const ex=await getDoc(doc(this.db,'rooms',code));if(!ex.exists())break;code=genCode();}
    const questions=(this._currentQs||[]).filter(q=>q.trim());
    const qs=questions.length>0?questions:suggestQs(suspected);
    const symptoms={}; qs.forEach((_,i)=>{symptoms['q'+i]={value:null,ts:null};});

    // Create blockchain block for patient registration
    const block=await createBlock({action:'PATIENT_ENROLLED',patient:name,doctor:this.user.name,hospital:this.user.hospital,drug:suspected,code});

    const room={
      code,doctorPhone:this.user.phone,doctorName:this.user.name,
      patientName:name,patientPhone:'',age:parseInt(age),gender,weight,
      diagnosis,note,suspectedDrug:suspected,
      status:'Active - Outpatient Monitoring',emergencyContact:ec,emergencyNotified:false,
      drugs,questionnaire:qs,symptoms,
      adherence:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(day=>({day,s:'pending'})),
      naranjo:{},qi:0,createdAt:new Date().toISOString(),
      blockchain:[block]
    };
    this._currentQs=null;
    await this.saveDoc('rooms',code,room);
    await this.postChat(code,'system','System',`Room created for ${name} by Dr. ${this.user.name}. Room code: ${code}`);
    await this.loadMyPatients();
    this.showRoomModal(name,code);
  }

  // ── ADR / NARANJO ─────────────────────────────────────────────────────────────

  async answerNaranjo(id,ans) {
    const p=this.currentPatient; if(!p) return;
    if(!p.naranjo) p.naranjo={};
    p.naranjo[id]=ans;
    await this.saveDoc('rooms',this.currentPatientCode,p);
    this.render();
  }

  async setWhoCausality(c) {
    const p=this.currentPatient; if(!p) return;
    p.whoCausality=c;
    await this.saveDoc('rooms',this.currentPatientCode,p);
    this.render();
  }

          </div>
        </div>
        <button onclick="app.logout()" class="btn-outline" style="max-width:200px;margin:0 auto">${icon('log-out','w-4 h-4')} Sign out</button>
      </div>
    </div>`;
  }

  vPharmacistInventory() {
    const allDrugs=this.patients.flatMap(p=>(p.drugs||[]).map(d=>({...d,patientName:p.patientName,code:p.code})));
    return `
    <div style="padding:0 0 100px">
      <div style="background:linear-gradient(135deg,#D97706,#92400E);padding:28px 20px 36px;border-radius:0 0 28px 28px">
        <div style="font-size:22px;font-weight:900;color:white">Drug inventory</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.65);margin-top:4px">${allDrugs.length} drug lines across ${this.patients.length} patients</div>
      </div>
      <div style="padding:16px">
        <div style="display:flex;flex-direction:column;gap:8px">
          ${allDrugs.map(d=>`
          <div class="card" style="padding:14px;display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-size:14px;font-weight:800;color:var(--vg-primary)">${d.name}</div>
              <div style="font-size:11px;color:#64748b;font-weight:600;margin-top:2px">${d.dose} · ${d.freq} · ${d.patientName}</div>
            </div>
            <span style="font-size:10px;font-weight:800;padding:4px 10px;border-radius:8px;${d.delivered?'background:#F0FDF4;color:#059669;border:1px solid #A7F3D0':'background:#FFF1F2;color:#E11D48;border:1px solid #FECDD3'}">
              ${d.delivered?'Delivered':'Pending'}
            </span>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  // ── BLOCKCHAIN AUDIT ──────────────────────────────────────────────────────────
  vBlockchain() {
    const p=this.currentPatient;
    const chain=p?.blockchain||[];
    return `
    <div style="padding:0 0 100px">
      <div class="hero-gradient" style="padding:28px 20px 36px;border-radius:0 0 28px 28px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
          <button onclick="history.back()||app.go('common-room')" style="background:rgba(255,255,255,0.15);border:none;border-radius:10px;padding:8px;cursor:pointer;color:white">
            ${icon('arrow-left','w-4 h-4')}
          </button>
          <div>
            <div style="font-size:18px;font-weight:900;color:white">Blockchain Audit Trail</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.6)">All patient actions on blockchain</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:8px">
            ${icon('shield-check','w-4 h-4 text-white')}
            <div>
              <div style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:700">STATUS</div>
              <div style="font-size:13px;font-weight:800;color:white">Verified</div>
            </div>
          </div>
          <div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:8px 14px">
            <div style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:700">BLOCKS</div>
            <div style="font-size:13px;font-weight:800;color:white">${chain.length}</div>
          </div>
          <div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:8px 14px">
            <div style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:700">NABH</div>
            <div style="font-size:13px;font-weight:800;color:#6EE7B7">Compliant</div>
          </div>
        </div>
      </div>

      <div style="padding:16px;display:flex;flex-direction:column;gap:10px">
        <!-- Metadata chips -->
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${['Hash','Transaction ID','Block height','Network','Proof of existence'].map(c=>`
          <div style="background:white;border:1px solid rgba(0,43,91,0.1);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--vg-secondary)">${c}</div>`).join('')}
        </div>

        ${chain.length===0?`
        <div class="card" style="padding:24px;text-align:center;color:#94a3b8">
          ${icon('shield','w-10 h-10')}
          <div style="margin-top:10px;font-weight:700">No blockchain records yet</div>
          <div style="font-size:12px;margin-top:4px">Records are created when patient events are logged</div>
        </div>`:chain.map((block,i)=>`
        <div class="card" style="padding:16px;${i===0?'border:1.5px solid var(--vg-tertiary)':''}">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="width:36px;height:36px;border-radius:10px;${i===0?'background:linear-gradient(135deg,var(--vg-secondary),var(--vg-tertiary))':'background:var(--vg-blue-light)'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${icon('shield-check','w-4 h-4')} 
            </div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:800;color:var(--vg-primary)">${block.data?.action||'Patient event'}</div>
              <div style="font-size:11px;color:#64748b;font-weight:600">${block.ts?new Date(block.ts).toLocaleString('en-IN'):'Unknown time'}</div>
            </div>
            <span class="badge-safe">${icon('check','w-3 h-3 inline')} Verified</span>
          </div>
          <div style="background:#F8FAFC;border-radius:10px;padding:10px">
            <div style="font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;margin-bottom:6px">Block hash</div>
            <div style="font-size:10px;font-weight:700;color:var(--vg-secondary);word-break:break-all;font-family:monospace">${block.hash||'—'}</div>
          </div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <div style="flex:1;background:#F8FAFC;border-radius:8px;padding:8px">
              <div style="font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase">NABH</div>
              <div style="font-size:11px;font-weight:700;color:var(--vg-tertiary);margin-top:2px">Compliant</div>
            </div>
            <div style="flex:1;background:#F8FAFC;border-radius:8px;padding:8px">
              <div style="font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase">Timestamp</div>
              <div style="font-size:11px;font-weight:700;color:var(--vg-primary);margin-top:2px">Secured</div>
            </div>
            <div style="flex:1;background:#F8FAFC;border-radius:8px;padding:8px">
              <div style="font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase">Chain</div>
              <div style="font-size:11px;font-weight:700;color:#059669;margin-top:2px">Intact</div>
            </div>
          </div>
        </div>`).join('')}

        <!-- Log new event -->
        <button class="btn-primary" onclick="app.logBlockchainEvent()">${icon('plus-circle','w-4 h-4')} Log new blockchain event</button>
        <div style="text-align:center;font-size:11px;color:#94a3b8;font-weight:600;line-height:1.6">
          Blockchain ensures data integrity and non-repudiation.<br>Every patient action is securely recorded.
        </div>
      </div>
    </div>`;
  }

  async logBlockchainEvent() {
    const p=this.currentPatient; if(!p) return;
    const block=await createBlock({action:'MANUAL_AUDIT_LOG',patient:p.patientName,room:this.currentPatientCode,by:this.user?.name||this.role,ts:new Date().toISOString()});
    if(!p.blockchain) p.blockchain=[];
    p.blockchain.push(block);
    await this.saveDoc('rooms',this.currentPatientCode,p);
    this.render();
  }

  // ── FIREBASE SUBSCRIPTIONS ────────────────────────────────────────────────────
  subscribeRoom(code) {
    if(this.unsub) this.unsub();
    this.unsub=onSnapshot(doc(this.db,'rooms',code),snap=>{
      if(snap.exists()){this.currentPatient=snap.data();this.render();}
    });
  }

  subscribeChat(code) {
    if(this.unsubChat) this.unsubChat();
    const q=collection(this.db,'rooms',code,'chat');
    this.unsubChat=onSnapshot(q,snap=>{
      this.chatMessages=snap.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>(a.ts?.seconds||0)-(b.ts?.seconds||0));
      const cf=document.getElementById('chat-feed');
      if(cf){
        const atBottom=cf.scrollHeight-cf.scrollTop-cf.clientHeight<80;
        const rendered=this.chatMessages.map(m=>this.renderChatMsg(m)).join('');
        cf.innerHTML=rendered;
        if(atBottom) cf.scrollTop=cf.scrollHeight;
        if(typeof lucide!=='undefined') lucide.createIcons();
      }
    });
  }

  async postChat(code,role,senderName,content,type='text') {
    try { await addDoc(collection(this.db,'rooms',code,'chat'),{role,senderName,content,type,ts:serverTimestamp()}); }
    catch(e) { console.warn('Chat post failed:',e); }
  }

  async loadMyPatients() {
    if(!this.db||!this.user) return;
    try {
      const snap=await getDocs(collection(this.db,'rooms'));
      this.patients=snap.docs.map(d=>d.data()).filter(p=>p.doctorPhone===this.user.phone);
    } catch(e) { console.warn('Load patients error:',e); }
  }

  async loadAllPatients() {
    if(!this.db) return;
    try {
      const snap=await getDocs(collection(this.db,'rooms'));
      this.patients=snap.docs.map(d=>d.data());
    } catch(e) { console.warn('Load all patients error:',e); }
  }

  // ── PATIENT ACTIONS ───────────────────────────────────────────────────────────
  async answerQ(k,v,questionText) {
    const p=this.currentPatient; if(!p) return;
    if(!p.symptoms) p.symptoms={};
    p.symptoms[k]={value:v,ts:new Date().toISOString(),question:questionText||k};
    p.qi=(p.qi||0)+1;
    const msg=v?`⚠ YES — ${questionText||k}`:`✓ NO — ${questionText||k}`;
    await this.postChat(this.currentPatientCode,'patient',this.user.name,msg,'symptom');
    await this.saveDoc('rooms',this.currentPatientCode,p);
    // Log to blockchain
    const block=await createBlock({action:'SYMPTOM_LOGGED',question:questionText,answer:v?'YES':'NO',patient:p.patientName,room:this.currentPatientCode});
    if(!p.blockchain) p.blockchain=[];
    p.blockchain.push(block);
    await this.saveDoc('rooms',this.currentPatientCode,{blockchain:p.blockchain});
  }

  async resetQ() {
    const p=this.currentPatient; if(!p) return;
    p.qi=0;
    const qs=(p.questionnaire&&p.questionnaire.length>0)?p.questionnaire:suggestQs(p.suspectedDrug||'default');
    const symptoms={}; qs.forEach((_,i)=>{symptoms['q'+i]={value:null,ts:null,question:qs[i]};});
    p.symptoms=symptoms;
    await this.saveDoc('rooms',this.currentPatientCode,p);
  }

  async toggleDay(i) {
    const p=this.currentPatient; if(!p) return;
    const c={pending:'taken',taken:'missed',missed:'pending'};
    p.adherence[i].s=c[p.adherence[i].s];
    await this.postChat(this.currentPatientCode,'patient',this.user.name,`${p.adherence[i].day}: Medication marked as ${p.adherence[i].s}`,'adherence');
    await this.saveDoc('rooms',this.currentPatientCode,p);
  }

  async toggleDelivery(drugId) {
    const p=this.currentPatient; if(!p) return;
    const drug=p.drugs.find(d=>d.id===drugId); if(!drug) return;
    drug.delivered=!drug.delivered;
    await this.postChat(this.currentPatientCode,'pharmacist','Pharmacist',`${drug.name}: ${drug.delivered?'Delivered to patient ✓':'Marked as pending'}`,'delivery');
    await this.saveDoc('rooms',this.currentPatientCode,p);
  }

  async notifyEmergency() {
    const p=this.currentPatient; if(!p) return;
    p.emergencyNotified=true;
    await this.postChat(this.currentPatientCode,'doctor','Dr. '+this.user.name,`🚨 Emergency contact (${p.emergencyContact}) notified by physician.`,'emergency');
    await this.saveDoc('rooms',this.currentPatientCode,p);
  }

  async sendChatMessage() {
    const el=document.getElementById('chat-input'); if(!el||!el.value.trim()) return;
    const content=el.value.trim(); el.value='';
    const name=this.role==='doctor'?('Dr. '+this.user.name):this.role==='patient'?(this.user.name):'Pharmacist';
    await this.postChat(this.currentPatientCode,this.role,name,content);
  }

  async logEmojiSymptom(label) {
    const p=this.currentPatient; if(!p) return;
    p._lastEmoji=label;
    const msg=`${label==='Great'?'👍':label==='Caution'?'⚠️':label==='Dizzy'?'😵':label==='Nauseous'?'🤢':label==='Fatigued'?'😴':'😰'} Feeling ${label} — quick symptom log`;
    await this.postChat(this.currentPatientCode,'patient',this.user.name,msg,'symptom');
    await this.saveDoc('rooms',this.currentPatientCode,{_lastEmoji:label});
    this.render();
  }

  handleEhrFile(file) {
    if(!file) return;
    alert('AI prescription scanning will auto-fill the patient form. Connect your Groq API key in settings to enable this feature.');
  }
}

window.app=new App();
</script>
</body>
</html>
