<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Viginyx | Precision Pharmacovigilance</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
:root {
  --vg-primary: #002B5B;
  --vg-secondary: #005FB8;
  --vg-tertiary: #00A3AD;
  --vg-teal-light: #E0F5F6;
  --vg-blue-light: #E6F2FB;
  --vg-neutral: #F8FAFC;
  --vg-danger: #E11D48;
}
html, body { background: var(--vg-neutral); margin: 0; padding: 0; min-height: 100vh; overscroll-behavior: none; }

/* ── Animations ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(225,29,72,0.5)} 70%{box-shadow:0 0 0 10px rgba(225,29,72,0)} 100%{box-shadow:0 0 0 0 rgba(225,29,72,0)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

.fade-up { animation: fadeUp 0.35s cubic-bezier(.16,1,.3,1) forwards; }
.slide-in { animation: slideIn 0.3s cubic-bezier(.16,1,.3,1) forwards; }
.danger-ring { animation: pulse-ring 1.4s infinite; }
.spinner { animation: spin 0.8s linear infinite; }
.bounce-dot { animation: bounce 1.2s ease-in-out infinite; }

/* ── Mobile shell ── */
.app-shell {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--vg-neutral);
  position: relative;
  overflow-x: hidden;
}

/* ── Top header ── */
.top-bar {
  background: rgba(248,250,252,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(0,43,91,0.08);
  padding: 12px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0,43,91,0.08);
  display: flex;
  z-index: 100;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
}
.nav-item { flex: 1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; cursor:pointer; transition:all 0.15s; }
.nav-item.active svg { color: var(--vg-secondary); }
.nav-item.active span { color: var(--vg-secondary); font-weight: 700; }
.nav-item span { font-size: 10px; color: #94a3b8; font-weight: 600; letter-spacing: 0.02em; }
.nav-item svg { width: 22px; height: 22px; color: #94a3b8; transition: color 0.15s; }

/* ── Cards ── */
.card { background: white; border-radius: 20px; border: 1px solid rgba(0,43,91,0.07); overflow: hidden; }
.card-sm { background: white; border-radius: 14px; border: 1px solid rgba(0,43,91,0.07); }

/* ── Buttons ── */
.btn-primary { background: var(--vg-secondary); color: white; border: none; border-radius: 14px; padding: 14px 20px; font-weight: 800; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary:active { transform: scale(0.97); background: var(--vg-primary); }
.btn-outline { background: transparent; color: var(--vg-secondary); border: 1.5px solid var(--vg-secondary); border-radius: 14px; padding: 13px 20px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-outline:active { background: var(--vg-blue-light); }
.btn-teal { background: var(--vg-tertiary); color: white; border: none; border-radius: 14px; padding: 14px 20px; font-weight: 800; font-size: 13px; cursor: pointer; transition: all 0.15s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-ghost { background: var(--vg-blue-light); color: var(--vg-secondary); border: none; border-radius: 12px; padding: 10px 16px; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.btn-danger { background: #FEF2F2; color: #E11D48; border: 1px solid #FECDD3; border-radius: 12px; padding: 10px 16px; font-weight: 700; font-size: 12px; cursor: pointer; }

/* ── Inputs ── */
.input-field { background: #F1F5F9; border: 1.5px solid transparent; border-radius: 12px; padding: 14px 16px; font-size: 15px; font-weight: 600; color: var(--vg-primary); outline: none; width: 100%; transition: all 0.15s; box-sizing: border-box; }
.input-field:focus { background: white; border-color: var(--vg-secondary); box-shadow: 0 0 0 3px rgba(0,95,184,0.1); }
.input-field::placeholder { color: #94a3b8; font-weight: 500; }
.input-label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: block; }

/* ── Status badges ── */
.badge-safe { background: #ECFDF5; color: #059669; border: 1px solid #A7F3D0; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
.badge-danger { background: #FFF1F2; color: #E11D48; border: 1px solid #FECDD3; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
.badge-pending { background: #FFFBEB; color: #D97706; border: 1px solid #FDE68A; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
.badge-info { background: var(--vg-blue-light); color: var(--vg-secondary); border: 1px solid #B3D4EF; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }

/* ── Hero gradient ── */
.hero-gradient { background: linear-gradient(145deg, var(--vg-primary) 0%, var(--vg-secondary) 60%, var(--vg-tertiary) 100%); }
.teal-gradient { background: linear-gradient(135deg, var(--vg-secondary) 0%, var(--vg-tertiary) 100%); }

/* ── Scrollable content area ── */
.page-content { padding: 0 0 100px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── Metric tile ── */
.metric-tile { background: white; border-radius: 16px; border: 1px solid rgba(0,43,91,0.07); padding: 16px; }
.metric-value { font-size: 28px; font-weight: 900; color: var(--vg-primary); line-height: 1; }
.metric-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

/* ── Chat bubbles ── */
.bubble-doctor { background: #EEF6FF; border-radius: 18px 18px 18px 4px; padding: 10px 14px; }
.bubble-patient { background: #E0F5F6; border-radius: 18px 18px 4px 18px; padding: 10px 14px; }
.bubble-pharmacist { background: #FFF7ED; border-radius: 18px 18px 18px 4px; padding: 10px 14px; }
.bubble-system { background: #F1F5F9; border-radius: 10px; padding: 8px 12px; text-align: center; }

/* ── Naranjo grid ── */
.naranjo-btn { padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.12s; border: 1.5px solid transparent; }
.naranjo-btn.yes { background: #EEF6FF; color: var(--vg-secondary); border-color: #B3D4EF; }
.naranjo-btn.yes.active { background: var(--vg-secondary); color: white; }
.naranjo-btn.no { background: #FFF1F2; color: #E11D48; border-color: #FECDD3; }
.naranjo-btn.no.active { background: #E11D48; color: white; }
.naranjo-btn.dk { background: #F8FAFC; color: #64748b; border-color: #E2E8F0; }
.naranjo-btn.dk.active { background: #64748b; color: white; }

/* ── Adherence dots ── */
.adh-dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.15s; }
.adh-dot.taken { background: #059669; border-color: #059669; color: white; }
.adh-dot.missed { background: #E11D48; border-color: #E11D48; color: white; }
.adh-dot.pending { background: white; color: #CBD5E1; }

/* ── Progress bar ── */
.prog-bar { height: 4px; background: #E2E8F0; border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--vg-secondary), var(--vg-tertiary)); border-radius: 99px; transition: width 0.4s ease; }

/* ── Floating action button ── */
.fab { position: fixed; bottom: 84px; right: calc(50% - 200px); width: 56px; height: 56px; background: var(--vg-secondary); border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 90; box-shadow: 0 8px 24px rgba(0,95,184,0.35); transition: all 0.15s; }
.fab:active { transform: scale(0.93); }
.fab svg { width: 24px; height: 24px; color: white; }

/* ── Modal overlay ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,15,40,0.55); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal-sheet { background: white; border-radius: 28px 28px 0 0; width: 100%; max-width: 430px; padding: 28px 24px 40px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(.16,1,.3,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; background: #E2E8F0; border-radius: 99px; margin: 0 auto 20px; }

/* ── Section header ── */
.section-hd { font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding: 0 20px; }

/* ── Otp input ── */
.otp-box { width: 48px; height: 56px; border: 2px solid #E2E8F0; border-radius: 14px; text-align: center; font-size: 24px; font-weight: 800; color: var(--vg-primary); outline: none; background: #F8FAFC; transition: all 0.15s; }
.otp-box:focus { border-color: var(--vg-secondary); background: white; box-shadow: 0 0 0 3px rgba(0,95,184,0.1); }

/* ── Yellow form ── */
.yf-section { border: 1px solid #CBD5E1; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
.yf-hd { background: var(--vg-primary); color: white; padding: 8px 14px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
.yf-body { padding: 12px; }
.yf-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.yf-field { flex: 1; min-width: 80px; }
.yf-label { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 3px; }
.yf-val { font-size: 12px; font-weight: 700; color: #1e293b; border-bottom: 1px solid #CBD5E1; padding-bottom: 3px; }

@media print {
  .top-bar, .bottom-nav, .fab, .no-print { display: none !important; }
  .page-content { padding-bottom: 0 !important; }
  #printable { display: block !important; }
}
</style>
